name: "brew pr-pull"

on:
  pull_request_target:
    types:
    - labeled

jobs:
  pr-pull:
    if: contains(github.event.pull_request.labels.*.name, 'pr-pull')

    runs-on: ubuntu-24.04

    permissions:
      contents: write
      packages: write
      pull-requests: write
      id-token: write

    steps:
    - name: "Generate GitHub App Token"
      id: github-app-token
      uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
      with:
        app-id: ${{ vars.SMYKLOT_APP_ID }}
        private-key: ${{ secrets.SMYKLOT_APP_PRIVATE_KEY }}

    - name: "Set up Homebrew"
      uses: Homebrew/actions/setup-homebrew@696ef0de3166f256259af861e4b6dcbb7b99d84b # master

    - name: "Set up git"
      uses: Homebrew/actions/git-user-config@696ef0de3166f256259af861e4b6dcbb7b99d84b # master

    - name: "Pull bottles"
      env:
        HOMEBREW_GITHUB_API_TOKEN: ${{ steps.github-app-token.outputs.token }}
        HOMEBREW_GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        HOMEBREW_GITHUB_PACKAGES_USER: ${{ github.repository_owner }}
        PULL_REQUEST: ${{ github.event.pull_request.number }}
      run: |
        brew pr-pull \
          --debug \
          --tap="$GITHUB_REPOSITORY" \
          --workflows="tests.yml" \
          "$PULL_REQUEST"

    - name: "Push commits"
      uses: Homebrew/actions/git-try-push@696ef0de3166f256259af861e4b6dcbb7b99d84b # master
      with:
        token: ${{ steps.github-app-token.outputs.token }}
        branch: main

    - name: "Delete branch"
      if: github.event.pull_request.head.repo.fork == false
      env:
        BRANCH: ${{ github.event.pull_request.head.ref }}
      run: git push --delete origin "$BRANCH"
